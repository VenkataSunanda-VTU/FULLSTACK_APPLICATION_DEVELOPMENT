<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">
  <div th:replace="~{fragments/navbar :: alerts}"></div>

  <!-- Header -->
  <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-3">
    <div>
      <h2><i class="bi bi-building me-2"></i>Employer Dashboard</h2>
      <p class="mb-0">Welcome, <strong th:text="${employer.name}"></strong>
        <span th:if="${employer.company}"> · <span th:text="${employer.company}"></span></span>
      </p>
    </div>
    <a th:href="@{/employer/jobs/new}" class="btn btn-warning fw-semibold px-4">
      <i class="bi bi-plus-circle me-2"></i>Post a New Job
    </a>
  </div>

  <!-- Stats -->
  <div class="row g-4 mb-4">
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-primary bg-opacity-10 text-primary">
            <i class="bi bi-briefcase-fill"></i>
          </div>
          <div>
            <div class="stat-number text-primary" th:text="${totalJobs}">0</div>
            <div class="stat-label">Total Jobs</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-success bg-opacity-10 text-success">
            <i class="bi bi-broadcast-pin"></i>
          </div>
          <div>
            <div class="stat-number text-success" th:text="${activeJobs}">0</div>
            <div class="stat-label">Active Listings</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-warning bg-opacity-10 text-warning">
            <i class="bi bi-people-fill"></i>
          </div>
          <div>
            <div class="stat-number text-warning" th:text="${totalApps}">0</div>
            <div class="stat-label">Applications</div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-sm-6 col-xl-3">
      <div class="stat-card card h-100">
        <div class="card-body d-flex align-items-center gap-3">
          <div class="stat-icon bg-info bg-opacity-10 text-info">
            <i class="bi bi-star-fill"></i>
          </div>
          <div>
            <div class="stat-number text-info" th:text="${shortlisted}">0</div>
            <div class="stat-label">Shortlisted</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent Jobs -->
  <div class="portal-table">
    <div class="px-4 py-3 border-bottom d-flex justify-content-between align-items-center">
      <h6 class="section-title mb-0"><i class="bi bi-clock-history me-2"></i>Recent Job Postings</h6>
      <a th:href="@{/employer/jobs}" class="btn btn-sm btn-outline-primary">View All</a>
    </div>
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Type</th>
            <th>Posted</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${recentJobs.empty}">
            <td colspan="6" class="text-center py-4 text-muted">
              <i class="bi bi-inbox d-block fs-2 mb-2"></i>
              No jobs posted yet.
              <a th:href="@{/employer/jobs/new}">Post your first job</a>
            </td>
          </tr>
          <tr th:each="job : ${recentJobs}">
            <td class="fw-semibold" th:text="${job.title}"></td>
            <td><span class="badge badge-active job-badge" th:text="${job.category}"></span></td>
            <td th:text="${job.jobType}"></td>
            <td class="text-muted small"
                th:text="${#temporals.format(job.postedAt,'dd MMM yyyy')}"></td>
            <td>
              <span th:class="${'badge job-badge ' +
                (job.status.name() == 'ACTIVE' ? 'badge-active' : 'badge-closed')}"
                    th:text="${job.status}"></span>
            </td>
            <td>
              <a th:href="@{/employer/jobs/{id}/applicants(id=${job.id})}"
                 class="btn btn-sm btn-outline-primary">
                <i class="bi bi-people me-1"></i>Applicants
              </a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer><i class="bi bi-briefcase-fill me-1"></i>JobPortal &copy; 2024. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
