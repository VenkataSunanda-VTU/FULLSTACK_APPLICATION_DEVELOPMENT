<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Jobs – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">
  <div th:replace="~{fragments/navbar :: alerts}"></div>

  <!-- Page Header + Search -->
  <div class="page-header">
    <div class="row align-items-center g-3">
      <div class="col-md-6">
        <h2 class="mb-1"><i class="bi bi-search me-2"></i>Browse Jobs</h2>
        <p class="mb-0" th:text="'Showing ' + ${jobs.size()} + ' available positions'"></p>
      </div>
      <div class="col-md-6">
        <form th:action="@{/student/jobs}" method="get">
          <div class="search-box">
            <i class="bi bi-search text-muted ms-1"></i>
            <input type="text" name="keyword" class="form-control" placeholder="Search by title, company, location..."
                   th:value="${keyword}">
            <button type="submit" class="btn btn-primary btn-sm px-3">Search</button>
            <a th:if="${keyword != null}" th:href="@{/student/jobs}" class="btn btn-outline-secondary btn-sm">
              <i class="bi bi-x"></i>
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Job Cards Grid -->
  <div th:if="${jobs.empty}" class="empty-state">
    <i class="bi bi-briefcase-x"></i>
    <h5>No jobs found</h5>
    <p class="text-muted">Try a different keyword or check back later.</p>
    <a th:href="@{/student/jobs}" class="btn btn-primary">Clear Search</a>
  </div>

  <div class="row g-4" th:unless="${jobs.empty}">
    <div class="col-md-6 col-xl-4" th:each="job : ${jobs}">
      <div class="job-card card h-100">
        <div class="card-body">

          <!-- Company + Status -->
          <div class="d-flex justify-content-between align-items-start mb-3">
            <div class="avatar-circle bg-primary bg-opacity-10 text-primary fw-bold"
                 style="width:44px;height:44px;border-radius:10px;font-size:1rem;">
              <span th:text="${#strings.substring(job.company,0,1).toUpperCase()}"></span>
            </div>
            <span th:if="${appliedJobIds.contains(job.id)}"
                  class="badge badge-shortlisted job-badge">
              <i class="bi bi-check-circle me-1"></i>Applied
            </span>
          </div>

          <!-- Title & Company -->
          <h6 class="fw-bold mb-1 text-dark" th:text="${job.title}"></h6>
          <p class="text-muted small mb-2" th:text="${job.company}"></p>

          <!-- Meta Tags -->
          <div class="d-flex flex-wrap gap-2 mb-3">
            <span class="badge bg-light text-dark border small">
              <i class="bi bi-geo-alt me-1"></i><span th:text="${job.location}"></span>
            </span>
            <span class="badge bg-light text-dark border small">
              <i class="bi bi-briefcase me-1"></i><span th:text="${job.jobType}"></span>
            </span>
            <span th:if="${job.salary}" class="badge bg-light text-dark border small">
              <i class="bi bi-currency-dollar me-1"></i><span th:text="${job.salary}"></span>
            </span>
          </div>

          <!-- Category badge -->
          <span class="badge badge-active job-badge mb-3" th:text="${job.category}"></span>

          <!-- Posted date -->
          <p class="text-muted" style="font-size:0.78rem;">
            <i class="bi bi-calendar3 me-1"></i>
            Posted <span th:text="${#temporals.format(job.postedAt,'dd MMM yyyy')}"></span>
          </p>

          <!-- Actions -->
          <div class="d-flex gap-2 mt-auto pt-2 border-top">
            <a th:href="@{/student/jobs/{id}(id=${job.id})}"
               class="btn btn-outline-primary btn-sm flex-fill">
              <i class="bi bi-eye me-1"></i>View
            </a>
            <a th:unless="${appliedJobIds.contains(job.id)}"
               th:href="@{/student/jobs/{id}(id=${job.id})}"
               class="btn btn-primary btn-sm flex-fill">
              <i class="bi bi-send me-1"></i>Apply
            </a>
            <span th:if="${appliedJobIds.contains(job.id)}"
                  class="btn btn-success btn-sm flex-fill disabled">
              <i class="bi bi-check me-1"></i>Applied
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer><i class="bi bi-briefcase-fill me-1"></i>JobPortal &copy; 2024. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
