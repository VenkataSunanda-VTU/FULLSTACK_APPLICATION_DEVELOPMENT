<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper py-4">
  <div class="auth-card" style="max-width:520px;">

    <div class="auth-header">
      <i class="bi bi-briefcase-fill mb-2 d-block" style="font-size:2.5rem;color:#f5a623;"></i>
      <h3 class="fw-bold mb-1"><span style="color:#f5a623;">Job</span>Portal</h3>
      <p class="mb-0 opacity-75">Create your free account</p>
    </div>

    <div class="auth-body">

      <div th:if="${errorMessage}" class="alert alert-danger rounded-3 py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <form th:action="@{/auth/register}" th:object="${user}" method="post" novalidate>

        <div class="row g-3">

          <!-- Full Name -->
          <div class="col-12">
            <label class="form-label">Full Name *</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-person text-muted"></i></span>
              <input type="text" th:field="*{name}" class="form-control"
                     th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                     placeholder="John Doe">
              <div class="invalid-feedback" th:errors="*{name}"></div>
            </div>
          </div>

          <!-- Email -->
          <div class="col-12">
            <label class="form-label">Email Address *</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-envelope text-muted"></i></span>
              <input type="email" th:field="*{email}" class="form-control"
                     th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                     placeholder="you@example.com">
              <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
          </div>

          <!-- Phone -->
          <div class="col-12">
            <label class="form-label">Phone Number</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-telephone text-muted"></i></span>
              <input type="text" th:field="*{phone}" class="form-control" placeholder="+1 234 567 8900">
            </div>
          </div>

          <!-- Role -->
          <div class="col-12">
            <label class="form-label">I am a *</label>
            <select th:field="*{role}" class="form-select"
                    th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'"
                    onchange="toggleCompany(this.value)">
              <option value="">-- Select Role --</option>
              <option value="STUDENT">🎓 Student / Job Seeker</option>
              <option value="EMPLOYER">🏢 Employer / Recruiter</option>
            </select>
            <div class="invalid-feedback" th:errors="*{role}"></div>
          </div>

          <!-- Company (shown for EMPLOYER) -->
          <div class="col-12" id="companyField" style="display:none;">
            <label class="form-label">Company Name *</label>
            <div class="input-group">
              <span class="input-group-text bg-light"><i class="bi bi-building text-muted"></i></span>
              <input type="text" th:field="*{company}" class="form-control" placeholder="Your Company Ltd.">
            </div>
          </div>

          <!-- Password -->
          <div class="col-md-6">
            <label class="form-label">Password *</label>
            <input type="password" th:field="*{password}" class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Min. 6 characters">
            <div class="invalid-feedback" th:errors="*{password}"></div>
          </div>

          <!-- Confirm Password -->
          <div class="col-md-6">
            <label class="form-label">Confirm Password *</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                   placeholder="Repeat password">
            <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
          </div>

        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mt-4">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>

      </form>

      <div class="text-center mt-3">
        <span class="text-muted small">Already have an account?</span>
        <a th:href="@{/auth/login}" class="text-primary fw-semibold ms-1 small">Sign In</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function toggleCompany(role) {
    document.getElementById('companyField').style.display =
      (role === 'EMPLOYER') ? 'block' : 'none';
  }
  // Restore on page load if validation failed
  const roleSelect = document.querySelector('[name="role"]');
  if (roleSelect) toggleCompany(roleSelect.value);
</script>
</body>
</html>
