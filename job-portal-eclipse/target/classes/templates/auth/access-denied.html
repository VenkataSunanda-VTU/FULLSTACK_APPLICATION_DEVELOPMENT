<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Denied – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
  <div class="text-center text-white">
    <i class="bi bi-shield-lock-fill" style="font-size:5rem;color:#e94560;"></i>
    <h1 class="display-4 fw-bold mt-3">403</h1>
    <h3 class="mb-3">Access Denied</h3>
    <p class="text-white-50 mb-4">You don't have permission to access this page.</p>
    <a th:href="@{/auth/login}" class="btn btn-warning px-4 py-2">
      <i class="bi bi-house me-2"></i>Go to Login
    </a>
  </div>
</div>
</body>
</html>
