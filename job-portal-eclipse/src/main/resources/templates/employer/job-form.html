<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post a Job – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:780px;">
  <div th:replace="~{fragments/navbar :: alerts}"></div>

  <div class="page-header">
    <h2>
      <i class="bi bi-plus-circle me-2" th:unless="${jobId}"></i>
      <i class="bi bi-pencil me-2" th:if="${jobId}"></i>
      <span th:text="${jobId != null} ? 'Edit Job Posting' : 'Post a New Job'">Post a Job</span>
    </h2>
    <p class="mb-0">Fill in the details to attract the right candidates.</p>
  </div>

  <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
    <form th:action="${jobId != null} ? @{/employer/jobs/{id}/edit(id=${jobId})} : @{/employer/jobs/new}"
          th:object="${jobDto}" method="post" novalidate>

      <div class="row g-3">

        <!-- Title -->
        <div class="col-12">
          <label class="form-label">Job Title *</label>
          <input type="text" th:field="*{title}" class="form-control"
                 th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                 placeholder="e.g. Senior Java Developer">
          <div class="invalid-feedback" th:errors="*{title}"></div>
        </div>

        <!-- Company + Location -->
        <div class="col-md-6">
          <label class="form-label">Company *</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-building text-muted"></i></span>
            <input type="text" th:field="*{company}" class="form-control"
                   th:classappend="${#fields.hasErrors('company')} ? 'is-invalid'"
                   placeholder="Company name">
            <div class="invalid-feedback" th:errors="*{company}"></div>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Location *</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-geo-alt text-muted"></i></span>
            <input type="text" th:field="*{location}" class="form-control"
                   th:classappend="${#fields.hasErrors('location')} ? 'is-invalid'"
                   placeholder="e.g. New York, NY / Remote">
            <div class="invalid-feedback" th:errors="*{location}"></div>
          </div>
        </div>

        <!-- Salary + JobType -->
        <div class="col-md-6">
          <label class="form-label">Salary / Range</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-currency-dollar text-muted"></i></span>
            <input type="text" th:field="*{salary}" class="form-control"
                   placeholder="e.g. $80,000 – $100,000/yr">
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Job Type *</label>
          <select th:field="*{jobType}" class="form-select"
                  th:classappend="${#fields.hasErrors('jobType')} ? 'is-invalid'">
            <option value="">-- Select Type --</option>
            <option value="Full-Time">Full-Time</option>
            <option value="Part-Time">Part-Time</option>
            <option value="Internship">Internship</option>
            <option value="Remote">Remote</option>
            <option value="Contract">Contract</option>
            <option value="Freelance">Freelance</option>
          </select>
          <div class="invalid-feedback" th:errors="*{jobType}"></div>
        </div>

        <!-- Category -->
        <div class="col-12">
          <label class="form-label">Category *</label>
          <select th:field="*{category}" class="form-select"
                  th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'">
            <option value="">-- Select Category --</option>
            <option value="Information Technology">Information Technology</option>
            <option value="Finance & Accounting">Finance &amp; Accounting</option>
            <option value="Marketing">Marketing</option>
            <option value="Sales">Sales</option>
            <option value="Human Resources">Human Resources</option>
            <option value="Engineering">Engineering</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Education">Education</option>
            <option value="Design">Design</option>
            <option value="Customer Service">Customer Service</option>
            <option value="Operations">Operations</option>
            <option value="Other">Other</option>
          </select>
          <div class="invalid-feedback" th:errors="*{category}"></div>
        </div>

        <!-- Description -->
        <div class="col-12">
          <label class="form-label">Job Description * <small class="text-muted">(min. 50 chars)</small></label>
          <textarea th:field="*{description}" class="form-control"
                    th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                    rows="8"
                    placeholder="Describe responsibilities, requirements, qualifications, benefits..."></textarea>
          <div class="invalid-feedback" th:errors="*{description}"></div>
          <small class="text-muted"><span id="charCount">0</span> characters</small>
        </div>

        <!-- Buttons -->
        <div class="col-12 d-flex gap-2 justify-content-end pt-2">
          <a th:href="@{/employer/jobs}" class="btn btn-outline-secondary px-4">Cancel</a>
          <button type="submit" class="btn btn-primary px-5">
            <i class="bi bi-check-circle me-1"></i>
            <span th:text="${jobId != null} ? 'Update Job' : 'Publish Job'">Publish Job</span>
          </button>
        </div>

      </div>
    </form>
  </div>
</div>

<footer><i class="bi bi-briefcase-fill me-1"></i>JobPortal &copy; 2024. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const desc = document.querySelector('textarea[name="description"]');
  const cnt  = document.getElementById('charCount');
  if (desc) {
    cnt.textContent = desc.value.length;
    desc.addEventListener('input', () => cnt.textContent = desc.value.length);
  }
</script>
</body>
</html>
