<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Profile – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:720px;">
  <div th:replace="~{fragments/navbar :: alerts}"></div>

  <div class="page-header">
    <h2><i class="bi bi-building me-2"></i>Company Profile</h2>
    <p class="mb-0">Manage your employer profile and company details</p>
  </div>

  <div class="card border-0 shadow-sm p-4" style="border-radius:16px;">
    <!-- Avatar -->
    <div class="text-center mb-4">
      <div class="avatar-circle mx-auto bg-warning text-dark fw-bold"
           style="width:80px;height:80px;font-size:2rem;">
        <span th:text="${#strings.substring(employer.name,0,1).toUpperCase()}"></span>
      </div>
      <span class="badge bg-warning text-dark mt-2 px-3 py-2 fw-semibold">Employer</span>
    </div>

    <form th:action="@{/employer/profile}" method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name *</label>
          <input type="text" name="name" class="form-control" th:value="${employer.name}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" class="form-control bg-light" th:value="${employer.email}" disabled>
          <small class="text-muted">Email cannot be changed.</small>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone Number</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-telephone text-muted"></i></span>
            <input type="text" name="phone" class="form-control" th:value="${employer.phone}">
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Company Name *</label>
          <div class="input-group">
            <span class="input-group-text bg-light"><i class="bi bi-building text-muted"></i></span>
            <input type="text" name="company" class="form-control" th:value="${employer.company}" required>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Member Since</label>
          <input type="text" class="form-control bg-light"
                 th:value="${#temporals.format(employer.createdAt,'dd MMM yyyy')}" disabled>
        </div>
        <div class="col-12 d-flex gap-2 justify-content-end pt-2">
          <a th:href="@{/employer/dashboard}" class="btn btn-outline-secondary px-4">Cancel</a>
          <button type="submit" class="btn btn-primary px-4">
            <i class="bi bi-check-circle me-1"></i>Save Changes
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<footer><i class="bi bi-briefcase-fill me-1"></i>JobPortal &copy; 2024. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
