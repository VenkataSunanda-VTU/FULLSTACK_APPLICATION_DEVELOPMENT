<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applicants – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-4 py-4">
  <div th:replace="~{fragments/navbar :: alerts}"></div>

  <!-- Job Info Header -->
  <div class="page-header">
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <a th:href="@{/employer/jobs}" class="btn btn-sm btn-light">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div>
        <h2 class="mb-1">
          <i class="bi bi-people me-2"></i>Applicants for: <em th:text="${job.title}"></em>
        </h2>
        <p class="mb-0">
          <i class="bi bi-building me-1"></i><span th:text="${job.company}"></span> ·
          <i class="bi bi-geo-alt me-1 ms-2"></i><span th:text="${job.location}"></span> ·
          <span th:class="${'badge ms-2 job-badge ' +
            (job.status.name() == 'ACTIVE' ? 'badge-active' : 'badge-closed')}"
                th:text="${job.status}"></span>
        </p>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div th:if="${applications.empty}" class="empty-state card border-0 shadow-sm" style="border-radius:14px;">
    <i class="bi bi-person-x"></i>
    <h5>No applicants yet</h5>
    <p>Share the job posting to attract candidates.</p>
  </div>

  <!-- Applicants Table -->
  <div th:unless="${applications.empty}" class="portal-table">
    <div class="px-4 py-3 border-bottom">
      <span class="fw-semibold text-muted small"
            th:text="${applications.size()} + ' applicant(s)'"></span>
    </div>
    <div class="table-responsive">
      <table class="table mb-0">
        <thead>
          <tr>
            <th>#</th>
            <th>Applicant</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Applied On</th>
            <th>Cover Letter</th>
            <th>Status</th>
            <th class="text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="app, stat : ${applications}">
            <td class="text-muted small" th:text="${stat.count}"></td>
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="avatar-circle bg-primary bg-opacity-10 text-primary fw-bold"
                     style="width:36px;height:36px;border-radius:50%;font-size:.85rem;">
                  <span th:text="${#strings.substring(app.student.name,0,1).toUpperCase()}"></span>
                </div>
                <span class="fw-semibold" th:text="${app.student.name}"></span>
              </div>
            </td>
            <td class="text-muted small" th:text="${app.student.email}"></td>
            <td class="text-muted small" th:text="${app.student.phone ?: '—'}"></td>
            <td class="text-muted small"
                th:text="${#temporals.format(app.appliedAt,'dd MMM yyyy')}"></td>
            <td>
              <span th:if="${app.coverLetter != null and !#strings.isEmpty(app.coverLetter)}">
                <button type="button" class="btn btn-sm btn-outline-info"
                        data-bs-toggle="modal"
                        th:data-bs-target="'#modal-' + ${app.id}">
                  <i class="bi bi-eye me-1"></i>View
                </button>
                <!-- Cover Letter Modal -->
                <div class="modal fade" th:id="'modal-' + ${app.id}" tabindex="-1">
                  <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow-lg rounded-4">
                      <div class="modal-header border-0" style="background:#0f3460;color:#fff;border-radius:1rem 1rem 0 0;">
                        <h5 class="modal-title">
                          <i class="bi bi-file-text me-2"></i>Cover Letter –
                          <span th:text="${app.student.name}"></span>
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                      </div>
                      <div class="modal-body p-4" style="white-space:pre-line;"
                           th:text="${app.coverLetter}"></div>
                    </div>
                  </div>
                </div>
              </span>
              <span th:unless="${app.coverLetter != null and !#strings.isEmpty(app.coverLetter)}"
                    class="text-muted small">—</span>
            </td>
            <td>
              <span th:class="${'badge job-badge ' +
                (app.status.name() == 'PENDING' ? 'badge-pending' :
                 app.status.name() == 'SHORTLISTED' ? 'badge-shortlisted' : 'badge-rejected')}"
                    th:text="${app.status}"></span>
            </td>
            <td>
              <div class="d-flex gap-1 justify-content-center">
                <form th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                  <input type="hidden" name="status" value="SHORTLISTED">
                  <button type="submit" class="btn btn-sm btn-success"
                          th:disabled="${app.status.name() == 'SHORTLISTED'}"
                          title="Shortlist">
                    <i class="bi bi-check-lg"></i>
                  </button>
                </form>
                <form th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                  <input type="hidden" name="status" value="REJECTED">
                  <button type="submit" class="btn btn-sm btn-danger"
                          th:disabled="${app.status.name() == 'REJECTED'}"
                          title="Reject">
                    <i class="bi bi-x-lg"></i>
                  </button>
                </form>
                <form th:action="@{/employer/applications/{id}/status(id=${app.id})}" method="post">
                  <input type="hidden" name="status" value="PENDING">
                  <button type="submit" class="btn btn-sm btn-outline-secondary"
                          th:disabled="${app.status.name() == 'PENDING'}"
                          title="Reset to Pending">
                    <i class="bi bi-arrow-counterclockwise"></i>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<footer><i class="bi bi-briefcase-fill me-1"></i>JobPortal &copy; 2024. All rights reserved.</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
