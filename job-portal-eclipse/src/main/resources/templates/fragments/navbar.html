<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ===== NAVBAR FRAGMENT ===== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold fs-4" href="#">
      <i class="bi bi-briefcase-fill me-2 text-warning"></i>
      <span class="text-warning">Job</span><span class="text-white">Portal</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">

      <!-- STUDENT NAV -->
      <ul sec:authorize="hasRole('STUDENT')" class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/student/dashboard}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/student/jobs}">
            <i class="bi bi-search me-1"></i>Browse Jobs
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/student/applications}">
            <i class="bi bi-file-earmark-text me-1"></i>My Applications
          </a>
        </li>
      </ul>

      <!-- EMPLOYER NAV -->
      <ul sec:authorize="hasRole('EMPLOYER')" class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/employer/dashboard}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/employer/jobs}">
            <i class="bi bi-briefcase me-1"></i>My Jobs
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/employer/jobs/new}">
            <i class="bi bi-plus-circle me-1"></i>Post a Job
          </a>
        </li>
      </ul>

      <!-- ADMIN NAV -->
      <ul sec:authorize="hasRole('ADMIN')" class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/admin/dashboard}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/admin/users}">
            <i class="bi bi-people me-1"></i>Users
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" th:href="@{/admin/jobs}">
            <i class="bi bi-briefcase me-1"></i>Jobs
          </a>
        </li>
      </ul>

      <!-- RIGHT: User Info + Logout -->
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" role="button" data-bs-toggle="dropdown">
            <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center"
                 style="width:34px;height:34px;">
              <i class="bi bi-person-fill text-dark"></i>
            </div>
            <span sec:authentication="name" class="text-white"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow">
            <li sec:authorize="hasRole('STUDENT')">
              <a class="dropdown-item" th:href="@{/student/profile}">
                <i class="bi bi-person-circle me-2"></i>My Profile
              </a>
            </li>
            <li sec:authorize="hasRole('EMPLOYER')">
              <a class="dropdown-item" th:href="@{/employer/profile}">
                <i class="bi bi-person-circle me-2"></i>My Profile
              </a>
            </li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <a class="dropdown-item text-danger" th:href="@{/auth/logout}">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ===== ALERTS FRAGMENT ===== -->
<div th:fragment="alerts" class="container-fluid px-4 pt-3">
  <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-check-circle-fill me-2"></i>
    <span th:text="${successMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
    <i class="bi bi-exclamation-triangle-fill me-2"></i>
    <span th:text="${errorMessage}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</div>

</html>
