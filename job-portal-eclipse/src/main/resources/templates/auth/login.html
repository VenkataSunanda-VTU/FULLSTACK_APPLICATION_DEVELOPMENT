<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – JobPortal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <!-- Header -->
    <div class="auth-header">
      <div class="mb-3">
        <i class="bi bi-briefcase-fill" style="font-size:2.8rem;color:#f5a623;"></i>
      </div>
      <h3 class="fw-bold mb-1"><span style="color:#f5a623;">Job</span>Portal</h3>
      <p class="mb-0 opacity-75">Find your dream career today</p>
    </div>

    <!-- Body -->
    <div class="auth-body">

      <!-- Flash messages -->
      <div th:if="${successMessage}" class="alert alert-success rounded-3 py-2 small">
        <i class="bi bi-check-circle me-1"></i>
        <span th:text="${successMessage}"></span>
      </div>
      <div th:if="${logoutMessage}" class="alert alert-info rounded-3 py-2 small">
        <i class="bi bi-info-circle me-1"></i>
        <span th:text="${logoutMessage}"></span>
      </div>
      <div th:if="${errorMessage}" class="alert alert-danger rounded-3 py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <h5 class="fw-bold mb-4 text-center" style="color:#0f3460;">Sign In to Your Account</h5>

      <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 rounded-start-3">
              <i class="bi bi-envelope text-muted"></i>
            </span>
            <input type="email" name="email" class="form-control border-start-0 rounded-end-3"
                   placeholder="you@example.com" required autofocus>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0 rounded-start-3">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" name="password" id="passwordField"
                   class="form-control border-start-0" placeholder="••••••••" required>
            <button type="button" class="input-group-text bg-light rounded-end-3"
                    onclick="togglePwd()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <div class="text-center">
        <span class="text-muted small">Don't have an account?</span>
        <a th:href="@{/auth/register}" class="text-primary fw-semibold ms-1 small">
          Create Account
        </a>
      </div>

      <!-- Demo credentials -->
      <div class="mt-4 p-3 rounded-3 bg-light">
        <p class="text-muted small fw-semibold mb-2">
          <i class="bi bi-info-circle me-1"></i>Demo Credentials
        </p>
        <div class="row g-1 small text-muted">
          <div class="col-12">
            <code>admin@jobportal.com</code> / <code>admin123</code>
            <span class="badge bg-danger ms-1">Admin</span>
          </div>
          <div class="col-12 mt-1">Register to test Student &amp; Employer roles.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePwd() {
    const f = document.getElementById('passwordField');
    const i = document.getElementById('eyeIcon');
    if (f.type === 'password') { f.type = 'text'; i.className = 'bi bi-eye-slash'; }
    else { f.type = 'password'; i.className = 'bi bi-eye'; }
  }
</script>
</body>
</html>
